<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Global Compounder — Macro Brief</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #16161e;
      border-bottom: 1px solid #2a2a3a;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.3px;
    }

    header span {
      font-size: 12px;
      color: #666;
    }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      background: #13131a;
      border-right: 1px solid #2a2a3a;
      overflow-y: auto;
      padding: 8px 0;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 600;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 16px 4px;
    }

    .brief-item {
      padding: 9px 16px;
      cursor: pointer;
      font-size: 13px;
      color: #aaa;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brief-item:hover {
      background: #1a1a26;
      color: #ddd;
    }

    .brief-item.active {
      background: #1a1a2e;
      color: #fff;
      border-left-color: #5a7fff;
    }

    .brief-item .date {
      font-size: 13px;
      font-weight: 500;
    }

    .brief-item .tag {
      font-size: 10px;
      color: #5a7fff;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Viewer */
    .viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .viewer-bar {
      background: #16161e;
      border-bottom: 1px solid #2a2a3a;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .viewer-bar span {
      font-size: 12px;
      color: #666;
    }

    .viewer-bar a {
      font-size: 12px;
      color: #5a7fff;
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid #5a7fff;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .viewer-bar a:hover {
      background: #5a7fff;
      color: #fff;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }

    .empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 14px;
    }

    /* Mobile */
    @media (max-width: 600px) {
      .layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        height: 120px;
        border-right: none;
        border-bottom: 1px solid #2a2a3a;
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        padding: 8px;
        gap: 4px;
      }
      .sidebar-label { display: none; }
      .brief-item {
        flex-shrink: 0;
        border-left: none;
        border-bottom: 3px solid transparent;
        border-radius: 6px;
        min-width: 90px;
        text-align: center;
      }
      .brief-item.active {
        border-left-color: transparent;
        border-bottom-color: #5a7fff;
      }
    }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<header>
  <h1>The Global Compounder</h1>
  <span>Macro Brief — Daily</span>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-label">Reportes</div>
    <div id="list"></div>
  </nav>

  <div class="viewer">
    <div class="viewer-bar">
      <span id="current-label">Selecciona un reporte</span>
      <a id="download-link" href="#" style="display:none" download>Descargar PDF</a>
    </div>
    <div id="frame-container" class="empty">
      Cargando reportes...
    </div>
  </div>
</div>

<script>
  async function loadBriefs() {
    let briefs = [];
    try {
      const res = await fetch('briefs.json');
      briefs = await res.json();
    } catch {
      document.getElementById('frame-container').textContent = 'No hay reportes disponibles aún.';
      return;
    }

    if (!briefs.length) {
      document.getElementById('frame-container').textContent = 'No hay reportes disponibles aún.';
      return;
    }

    const list = document.getElementById('list');
    briefs.forEach((b, i) => {
      const el = document.createElement('div');
      el.className = 'brief-item' + (i === 0 ? ' active' : '');
      el.innerHTML = `<span class="date">${b.date}</span><span class="tag">BRIEF</span>`;
      el.addEventListener('click', () => openBrief(b, el));
      list.appendChild(el);
    });

    openBrief(briefs[0], list.firstChild);
  }

  function openBrief(b, el) {
    document.querySelectorAll('.brief-item').forEach(e => e.classList.remove('active'));
    el.classList.add('active');

    document.getElementById('current-label').textContent = `Brief ${b.date}`;

    const dl = document.getElementById('download-link');
    dl.href = b.pdf;
    dl.style.display = 'inline';

    const container = document.getElementById('frame-container');
    container.className = 'viewer';
    container.style.flex = '1';
    container.style.display = 'flex';
    container.innerHTML = `<iframe src="${b.pdf}"></iframe>`;
  }

  loadBriefs();
</script>
</body>
</html>
