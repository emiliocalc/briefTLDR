name: Daily Macro Brief

on:
  schedule:
    - cron: '0 14 * * 1-5'   # Lunes a viernes 14:00 UTC (11:00 AM Chile)
  workflow_dispatch:           # Permite correrlo manualmente desde GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python download_macro_fred.py

      - name: Run Pipeline 3
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
        run: python pipeline3.py

      - name: Update briefs.json
        run: |
          python - <<'EOF'
          import json, os, re
          from pathlib import Path

          summ = Path("data/daily_summaries")
          pdfs = sorted(summ.glob("*_p3.pdf"), reverse=True)
          briefs = []
          for p in pdfs:
              m = re.match(r"(\d{4}-\d{2}-\d{2})_p3\.pdf", p.name)
              if m:
                  date = m.group(1)
                  briefs.append({
                      "date": date,
                      "pdf":  f"data/daily_summaries/{date}_p3.pdf",
                      "md":   f"data/daily_summaries/{date}_p3.md"
                  })
          with open("briefs.json", "w") as f:
              json.dump(briefs, f, indent=2)
          print(f"briefs.json updated with {len(briefs)} entries")
          EOF

      - name: Commit and push brief
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_summaries/*_p3.pdf data/daily_summaries/*_p3.md briefs.json data/cnn_fg_cache.json || true
          git diff --cached --quiet || git commit -m "brief $(date +%Y-%m-%d)"
          git push
